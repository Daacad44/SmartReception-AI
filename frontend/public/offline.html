<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090B14" />
    <title>You're offline — SmartReception AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 0%, #101527 0%, #090b14 60%);
        color: #e2e8f0;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 420px; }
      .icon {
        width: 84px; height: 84px; border-radius: 22px;
        background: #090b14;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 28px;
        box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 20px 60px -20px rgba(251,191,36,.35);
      }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
      p { font-size: 14.5px; line-height: 1.6; color: #94a3b8; margin-bottom: 26px; }
      .dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: #f59e0b; margin-right: 8px; vertical-align: middle;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:.35;} 50%{opacity:1;} }
      button {
        font: inherit; font-weight: 600; font-size: 14px;
        color: #090b14; background: linear-gradient(135deg, #fde68a, #fbbf24 55%, #f59e0b);
        border: 0; border-radius: 12px; padding: 12px 26px; cursor: pointer;
        transition: transform .15s ease, filter .15s ease;
      }
      button:hover { transform: translateY(-1px); filter: brightness(1.05); }
      .hint { margin-top: 22px; font-size: 12.5px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg width="46" height="46" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g" x1="10" y1="7" x2="40" y2="43" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FDE68A" /><stop offset=".52" stop-color="#FBBF24" /><stop offset="1" stop-color="#F59E0B" />
            </linearGradient>
          </defs>
          <path d="M13 33v-6a11 11 0 0 1 22 0v6" stroke="#CBD5E1" stroke-width="2.2" stroke-linecap="round" fill="none" opacity=".85" />
          <rect x="8.4" y="30.5" width="5.4" height="11" rx="2.7" fill="#E2E8F0" />
          <rect x="34.2" y="30.5" width="5.4" height="11" rx="2.7" fill="#E2E8F0" />
          <path d="M31.2 17.6c0-3.4-3.8-5.6-8.4-5.6-4.8 0-8.4 2.4-8.4 6 0 7.1 17.4 4.4 17.4 11.6 0 3.8-3.9 6.2-9 6.2-4.7 0-8.2-2-8.9-4.9" stroke="url(#g)" stroke-width="4.4" stroke-linecap="round" fill="none" />
        </svg>
      </div>
      <h1><span class="dot"></span>You're offline</h1>
      <p>
        SmartReception AI can't reach the network right now. Your cached workspace —
        dashboard, recent conversations and settings — is still available. We'll
        reconnect and sync automatically the moment you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint">This page works without an internet connection.</div>
    </div>
    <script>
      // Auto-recover the moment connectivity returns.
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
