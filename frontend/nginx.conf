server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # NOTE: Do NOT declare a bare `types { }` block here. In nginx a `types`
    # block at server/location scope *replaces* the inherited MIME map
    # (/etc/nginx/mime.types) instead of extending it, so every file except
    # the listed ones falls back to `default_type` (application/octet-stream).
    # That makes the browser download index.html / JS / CSS instead of
    # rendering them. The manifest's MIME type is set in its own location
    # block below via `default_type`, keeping the inherited map intact.

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json text/xml application/xml image/svg+xml;

    # Service worker: never cache, so new deployments are picked up immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # Manifest + offline shell: always revalidate.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /offline.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Content-hashed build assets: cache aggressively (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA routes: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
