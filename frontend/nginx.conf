server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME type for the web app manifest.
    types {
        application/manifest+json  webmanifest;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json text/xml application/xml image/svg+xml;

    # Service worker: never cache, so new deployments are picked up immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # Manifest + offline shell: always revalidate.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /offline.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Content-hashed build assets: cache aggressively (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA routes: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
